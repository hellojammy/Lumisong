<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Lumisong logo mark</title>
  <desc id="desc">Five primary glowing sound-event nodes with faint secondary event dots, a cyan playback light path, and a subtle dense perspective grid.</desc>
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="78%">
      <stop offset="0" stop-color="#10233a"/>
      <stop offset="0.48" stop-color="#07101d"/>
      <stop offset="1" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="trail" x1="120" y1="238" x2="386" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.56" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="gridLine" x1="80" y1="350" x2="432" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1e3a8a" stop-opacity="0"/>
    </linearGradient>
    <filter id="nodeGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.62 0 0 0 0 1 0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="accentGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.98 0 0 0 0 0.45 0 0 0 0 0.08 0 0 0 0.78 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="trailGlow" x="-30%" y="-90%" width="160%" height="280%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.28 0 0 0 0 0.74 0 0 0 0 1 0 0 0 0.65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect x="24" y="24" width="464" height="464" rx="104"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="#05070d"/>
  <g clip-path="url(#clip)">
    <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
    <circle cx="110" cy="84" r="176" fill="#3b82f6" opacity="0.08"/>
    <circle cx="432" cy="302" r="160" fill="#f97316" opacity="0.045"/>

    <g opacity="0.92">
      <path d="M64 415H448" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M84 394H428" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M103 375H409" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M121 359H391" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M137 345H375" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M153 332H359" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M170 321H342" stroke="url(#gridLine)" stroke-width="1"/>
      <path d="M72 425L189 314" stroke="#38bdf8" stroke-opacity="0.16" stroke-width="1"/>
      <path d="M121 438L213 308" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="1"/>
      <path d="M171 450L237 304" stroke="#38bdf8" stroke-opacity="0.13" stroke-width="1"/>
      <path d="M222 462L257 302" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1"/>
      <path d="M276 462L276 302" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1"/>
      <path d="M330 450L297 304" stroke="#38bdf8" stroke-opacity="0.13" stroke-width="1"/>
      <path d="M381 438L321 308" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="1"/>
      <path d="M432 425L347 314" stroke="#38bdf8" stroke-opacity="0.16" stroke-width="1"/>
    </g>

    <g fill="#7dd3fc" opacity="0.28">
      <circle cx="143" cy="222" r="3.6"/>
      <circle cx="178" cy="178" r="2.7"/>
      <circle cx="207" cy="256" r="2.4"/>
      <circle cx="232" cy="148" r="3.1"/>
      <circle cx="266" cy="222" r="2.5"/>
      <circle cx="294" cy="132" r="2.3"/>
      <circle cx="318" cy="244" r="3.2"/>
      <circle cx="352" cy="190" r="2.4"/>
      <circle cx="374" cy="264" r="2.8"/>
      <circle cx="196" cy="310" r="2.5"/>
      <circle cx="253" cy="288" r="3"/>
      <circle cx="330" cy="304" r="2.3"/>
    </g>

    <path d="M121 246C153 225 174 193 211 202C248 211 247 161 286 151C323 142 333 190 385 175" fill="none" stroke="url(#trail)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#trailGlow)"/>
    <path d="M121 246C153 225 174 193 211 202C248 211 247 161 286 151C323 142 333 190 385 175" fill="none" stroke="#e0f2fe" stroke-opacity="0.55" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#nodeGlow)">
      <circle cx="121" cy="246" r="14" fill="#67e8f9"/>
      <circle cx="211" cy="202" r="18" fill="#38bdf8"/>
      <circle cx="286" cy="151" r="13" fill="#a5f3fc"/>
      <circle cx="337" cy="190" r="11" fill="#60a5fa"/>
      <circle cx="385" cy="175" r="16" fill="#7dd3fc"/>
    </g>
    <g filter="url(#accentGlow)">
      <circle cx="211" cy="202" r="7" fill="#f97316"/>
    </g>
    <g fill="#f0f9ff" opacity="0.8">
      <circle cx="116" cy="241" r="3.3"/>
      <circle cx="204" cy="194" r="3.8"/>
      <circle cx="281" cy="146" r="2.9"/>
      <circle cx="381" cy="169" r="3.5"/>
    </g>
  </g>
</svg>
