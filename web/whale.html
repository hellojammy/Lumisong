<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Blue Whale</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #071827;
        color: #dceff7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
      }

      .label {
        position: fixed;
        top: 18px;
        left: 20px;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(224, 244, 255, 0.72);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="label">Procedural Blue Whale</div>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x071827);
      scene.fog = new THREE.FogExp2(0x071827, 0.032);

      const camera = new THREE.PerspectiveCamera(39, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0.5, 1.25, 8.8);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0.2, 0.04, 0);
      controls.minDistance = 4;
      controls.maxDistance = 14;

      scene.add(new THREE.HemisphereLight(0xa6eaff, 0x09233a, 2.35));

      const key = new THREE.DirectionalLight(0xf8fdff, 3.2);
      key.position.set(-4, 5.6, 4.4);
      key.castShadow = true;
      scene.add(key);

      const rim = new THREE.DirectionalLight(0x54d8ff, 1.6);
      rim.position.set(5, 2.2, -4);
      scene.add(rim);

      const underFill = new THREE.PointLight(0x2ea7d8, 1.7, 12);
      underFill.position.set(0, -2.5, 3.8);
      scene.add(underFill);

      const whale = new THREE.Group();
      const bodyRoot = new THREE.Group();
      const tailRoot = new THREE.Group();
      const flukeRoot = new THREE.Group();
      const leftPectoral = new THREE.Group();
      const rightPectoral = new THREE.Group();
      const throatPleats = [];
      const bodyWaveSegments = [];
      const smoothBlueWhaleSilhouette = true;
      const imageReferenceFluke = true;

      scene.add(whale);
      whale.add(bodyRoot, tailRoot);

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function smoothstep(t) {
        return t * t * (3 - 2 * t);
      }

      function profileAt(x) {
        const profile = [
          [-2.55, 0.18, 0.2, -0.02],
          [-2.18, 0.33, 0.39, -0.02],
          [-1.45, 0.54, 0.62, 0.01],
          [-0.35, 0.74, 0.86, 0.05],
          [0.75, 0.76, 0.9, 0.06],
          [1.75, 0.67, 0.82, 0.02],
          [2.48, 0.52, 0.68, -0.06],
          [3.08, 0.18, 0.36, -0.12],
        ];
        for (let i = 0; i < profile.length - 1; i++) {
          const a = profile[i];
          const b = profile[i + 1];
          if (x >= a[0] && x <= b[0]) {
            const k = smoothstep((x - a[0]) / (b[0] - a[0]));
            return {
              ry: lerp(a[1], b[1], k),
              rz: lerp(a[2], b[2], k),
              cy: lerp(a[3], b[3], k),
            };
          }
        }
        const p = x < profile[0][0] ? profile[0] : profile[profile.length - 1];
        return { ry: p[1], rz: p[2], cy: p[3] };
      }

      function createWhaleBodyGeometry() {
        const rings = 58;
        const radial = 42;
        const positions = [];
        const normals = [];
        const colors = [];
        const indices = [];
        const top = new THREE.Color(0x1e638d);
        const side = new THREE.Color(0x3b96b7);
        const belly = new THREE.Color(0xe2f1f4);
        const shadowBlue = new THREE.Color(0x143f62);

        for (let i = 0; i <= rings; i++) {
          const u = i / rings;
          const x = lerp(-2.55, 3.08, u);
          const profile = profileAt(x);
          const headLift = smoothstep(Math.max(0, (x - 1.15) / 1.85)) * 0.04;
          for (let j = 0; j <= radial; j++) {
            const v = j / radial;
            const theta = v * Math.PI * 2;
            const sin = Math.sin(theta);
            const cos = Math.cos(theta);
            const sideSquash = 1 - Math.max(0, -sin) * 0.12;
            const noseFlatten = 1 - Math.max(0, (x - 2.55) / 0.55) * 0.2;
            const y = profile.cy + sin * profile.ry * sideSquash + headLift;
            const z = cos * profile.rz * noseFlatten;
            positions.push(x, y, z);
            normals.push(0, sin, cos);

            const bellyBlend = smoothstep(Math.max(0, (-sin - 0.1) / 0.9));
            const sideBlend = smoothstep(1 - Math.abs(cos));
            const xShade = smoothstep(Math.max(0, (x + 2.2) / 4.8));
            const c = top.clone().lerp(side, 0.34 + 0.22 * sideBlend).lerp(belly, bellyBlend);
            if (sin > 0.45) c.lerp(shadowBlue, 0.08);
            c.offsetHSL(0, 0, (xShade - 0.5) * 0.05);
            colors.push(c.r, c.g, c.b);
          }
        }

        const tailCenterIndex = positions.length / 3;
        {
          const x = -2.55;
          const p = profileAt(x);
          const c = side.clone().lerp(belly, 0.18);
          positions.push(x - 0.02, p.cy, 0);
          normals.push(-1, 0, 0);
          colors.push(c.r, c.g, c.b);
        }

        const noseCenterIndex = positions.length / 3;
        {
          const x = 3.08;
          const p = profileAt(x);
          const c = side.clone().lerp(belly, 0.08);
          positions.push(x + 0.02, p.cy, 0);
          normals.push(1, 0, 0);
          colors.push(c.r, c.g, c.b);
        }

        for (let i = 0; i < rings; i++) {
          for (let j = 0; j < radial; j++) {
            const a = i * (radial + 1) + j;
            const b = a + radial + 1;
            indices.push(a, b, a + 1, b, b + 1, a + 1);
          }
        }

        for (let j = 0; j < radial; j++) {
          indices.push(tailCenterIndex, j + 1, j);
          const noseBase = rings * (radial + 1);
          indices.push(noseCenterIndex, noseBase + j, noseBase + j + 1);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        return geometry;
      }

      const bodyMat = new THREE.MeshStandardMaterial({
        vertexColors: true,
        roughness: 0.38,
        metalness: 0.02,
        emissive: 0x06253a,
        emissiveIntensity: 0.18,
      });
      const bodyMesh = new THREE.Mesh(createWhaleBodyGeometry(), bodyMat);
      bodyMesh.castShadow = true;
      bodyMesh.receiveShadow = true;
      bodyRoot.add(bodyMesh);

      function mat(color, roughness = 0.5, emissive = 0.08) {
        const c = new THREE.Color(color);
        return new THREE.MeshStandardMaterial({
          color: c,
          roughness,
          metalness: 0.03,
          emissive: c.clone().multiplyScalar(emissive),
        });
      }

      const finMat = mat(0x247597, 0.48, 0.1);
      finMat.side = THREE.DoubleSide;
      const darkLineMat = new THREE.MeshBasicMaterial({ color: 0x082439, transparent: true, opacity: 0.7 });
      const pleatMat = new THREE.MeshBasicMaterial({ color: 0x9dcbd3, transparent: true, opacity: 0.56 });
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0x03101a, roughness: 0.22 });

      function makeMesh(geometry, material, position, scale, rotation = [0, 0, 0]) {
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(...position);
        mesh.scale.set(...scale);
        mesh.rotation.set(...rotation);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      }

      function finGeometry(points) {
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(points.flat(), 3));
        geometry.computeVertexNormals();
        return geometry;
      }

      function tube(points, radius, material, segments = 40) {
        const curve = new THREE.CatmullRomCurve3(points.map(([x, y, z]) => new THREE.Vector3(x, y, z)));
        return new THREE.Mesh(new THREE.TubeGeometry(curve, segments, radius, 8, false), material);
      }

      const mouthNear = tube(
        [
          [3.03, -0.18, 0.42],
          [2.43, -0.17, 0.55],
          [1.62, -0.19, 0.62],
          [0.72, -0.22, 0.55],
        ],
        0.012,
        darkLineMat,
      );
      bodyRoot.add(mouthNear);

      const mouthFar = tube(
        [
          [2.98, -0.19, -0.42],
          [2.32, -0.18, -0.53],
          [1.48, -0.2, -0.54],
        ],
        0.008,
        new THREE.MeshBasicMaterial({ color: 0x082439, transparent: true, opacity: 0.32 }),
      );
      bodyRoot.add(mouthFar);

      for (let i = -5; i <= 5; i++) {
        const z = i * 0.082;
        const pleat = tube(
          [
            [2.35, -0.5, z * 0.4],
            [1.74, -0.67, z * 0.86],
            [0.8, -0.69, z],
            [-0.08, -0.57, z * 0.7],
          ],
          0.0055,
          pleatMat.clone(),
          34,
        );
        throatPleats.push(pleat);
        bodyRoot.add(pleat);
      }

      const dorsal = makeMesh(
        finGeometry([
          [0.0, 0.0, 0.0],
          [-0.24, 0.48, 0.02],
          [-0.7, 0.05, 0.03],
          [0.0, 0.0, 0.0],
          [-0.7, 0.05, 0.03],
          [-0.18, -0.02, -0.05],
        ]),
        finMat,
        [-0.82, 0.72, 0.02],
        [0.78, 0.78, 0.78],
        [0.04, 0, -0.12],
      );
      bodyRoot.add(dorsal);

      const pectoralGeo = finGeometry([
        [0.04, 0.04, 0],
        [0.62, -0.1, 0.05],
        [1.28, -1.08, 0.02],
        [0.04, 0.04, 0],
        [1.28, -1.08, 0.02],
        [0.3, -0.16, -0.12],
        [0.3, -0.16, -0.12],
        [1.28, -1.08, 0.02],
        [0.68, -1.18, -0.03],
      ]);

      leftPectoral.add(makeMesh(pectoralGeo, finMat, [0, 0, 0], [1, 1, 1]));
      leftPectoral.position.set(0.98, -0.13, 0.66);
      leftPectoral.rotation.set(0.62, -0.22, -0.24);
      bodyRoot.add(leftPectoral);

      rightPectoral.add(makeMesh(pectoralGeo, finMat, [0, 0, 0], [1, 1, 1]));
      rightPectoral.position.set(0.98, -0.16, -0.66);
      rightPectoral.rotation.set(-0.62, 0.22, -0.24);
      rightPectoral.scale.z = -1;
      bodyRoot.add(rightPectoral);

      tailRoot.position.set(-2.52, -0.02, 0);
      const peduncle = makeMesh(new THREE.CylinderGeometry(0.18, 0.32, 1.1, 32), mat(0x1f638d, 0.45, 0.09), [-0.36, 0, 0], [0.92, 1, 0.5], [0, 0, Math.PI / 2]);
      const tailStem = makeMesh(new THREE.CylinderGeometry(0.09, 0.18, 0.9, 28), finMat, [-0.96, 0, 0], [0.86, 1, 0.42], [0, 0, Math.PI / 2]);
      tailRoot.add(peduncle, tailStem);

      flukeRoot.position.set(-1.34, 0, 0);
      tailRoot.add(flukeRoot);

      const leftFlukeGeo = finGeometry([
        [0, 0, 0.02],
        [-0.46, 0.08, 0.64],
        [-1.5, 0.02, 1.2],
        [0, 0, 0.02],
        [-1.5, 0.02, 1.2],
        [-0.8, -0.12, 0.1],
        [-0.8, -0.12, 0.1],
        [-1.5, 0.02, 1.2],
        [-1.15, -0.2, 0.45],
      ]);
      const rightFlukeGeo = finGeometry([
        [0, 0, -0.02],
        [-0.46, 0.08, -0.64],
        [-1.5, 0.02, -1.2],
        [0, 0, -0.02],
        [-1.5, 0.02, -1.2],
        [-0.8, -0.12, -0.1],
        [-0.8, -0.12, -0.1],
        [-1.5, 0.02, -1.2],
        [-1.15, -0.2, -0.45],
      ]);
      flukeRoot.add(makeMesh(leftFlukeGeo, finMat, [0, 0, 0], [1, 1, 1]));
      flukeRoot.add(makeMesh(rightFlukeGeo, finMat, [0, 0, 0], [1, 1, 1]));

      const eyeNear = makeMesh(new THREE.SphereGeometry(0.052, 18, 12), eyeMat, [2.34, 0.08, 0.55], [1, 1, 1]);
      const eyeFar = makeMesh(new THREE.SphereGeometry(0.04, 18, 12), eyeMat, [2.34, 0.08, -0.55], [1, 1, 1]);
      bodyRoot.add(eyeNear, eyeFar);

      const noseCap = makeMesh(new THREE.SphereGeometry(1, 32, 18), mat(0x3b96b7, 0.38, 0.1), [2.99, -0.12, 0], [0.2, 0.25, 0.4]);
      bodyRoot.add(noseCap);

      const blowhole = makeMesh(
        new THREE.CylinderGeometry(0.034, 0.048, 0.018, 18),
        new THREE.MeshBasicMaterial({ color: 0x061522, transparent: true, opacity: 0.82 }),
        [2.56, 0.36, 0],
        [1.42, 1, 0.54],
        [Math.PI / 2, 0, 0],
      );
      bodyRoot.add(blowhole);

      for (const x of [1.4, 0.6, -0.2, -1.0, -1.75]) {
        const marker = new THREE.Group();
        marker.position.x = x;
        marker.userData.baseY = 0;
        bodyRoot.add(marker);
        bodyWaveSegments.push(marker);
      }

      const bubbleMat = new THREE.MeshBasicMaterial({
        color: 0xb7f2ff,
        transparent: true,
        opacity: 0.3,
        depthWrite: false,
      });
      const bubbles = [];
      for (let i = 0; i < 64; i++) {
        const bubble = new THREE.Mesh(new THREE.SphereGeometry(0.014 + Math.random() * 0.04, 10, 8), bubbleMat);
        bubble.position.set(-6.3 + Math.random() * 12.6, -3.1 + Math.random() * 6.2, -4.2 + Math.random() * 8.4);
        bubble.userData.phase = Math.random() * Math.PI * 2;
        bubble.userData.speed = 0.12 + Math.random() * 0.3;
        bubbles.push(bubble);
        scene.add(bubble);
      }

      const causticMat = new THREE.MeshBasicMaterial({
        color: 0x5fdcff,
        transparent: true,
        opacity: 0.1,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const caustics = new THREE.Group();
      for (let i = 0; i < 9; i++) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(1.2 + i * 0.13, 0.005, 6, 72), causticMat);
        ring.rotation.x = Math.PI / 2;
        ring.rotation.z = i * 0.68;
        ring.position.set(-4.2 + i, -2.7, -1.8 + Math.sin(i) * 1.8);
        ring.scale.set(1.5, 0.4, 1);
        caustics.add(ring);
      }
      scene.add(caustics);

      const clock = new THREE.Clock();

      function animate() {
        const t = clock.getElapsedTime();
        const tailBeat = Math.sin(t * 2.05);
        const tailBeatSoft = Math.sin(t * 2.05 - 0.55);
        const breath = Math.sin(t * 0.62);

        whale.position.y = breath * 0.12;
        whale.position.x = Math.sin(t * 0.28) * 0.1;
        whale.rotation.y = -0.48 + Math.sin(t * 0.24) * 0.09;
        whale.rotation.z = Math.sin(t * 0.42) * 0.028;

        bodyWaveSegments.forEach((segment, index) => {
          const strength = index / (bodyWaveSegments.length - 1);
          const phase = t * 2.05 - index * 0.42;
          segment.position.y = segment.userData.baseY + Math.sin(phase) * 0.024 * strength;
          segment.rotation.z = Math.sin(phase) * 0.035 * strength;
        });

        bodyRoot.rotation.z = Math.sin(t * 2.05 - 1.35) * 0.012;
        tailRoot.rotation.z = tailBeatSoft * 0.23;
        flukeRoot.rotation.z = tailBeat * 0.48;
        flukeRoot.rotation.x = -0.18 + Math.sin(t * 2.05 + 0.45) * 0.06;

        leftPectoral.rotation.x = 0.62 + Math.sin(t * 0.92 + 0.35) * 0.06;
        leftPectoral.rotation.z = -0.24 + Math.sin(t * 0.74) * 0.03;
        rightPectoral.rotation.x = -0.62 - Math.sin(t * 0.92 + 0.35) * 0.06;
        rightPectoral.rotation.z = -0.24 + Math.sin(t * 0.74) * 0.03;

        throatPleats.forEach((pleat, index) => {
          pleat.material.opacity = 0.46 + Math.sin(t * 1.2 + index * 0.33) * 0.08;
        });

        for (const bubble of bubbles) {
          bubble.position.y += bubble.userData.speed * 0.012;
          bubble.position.x += Math.sin(t * 0.9 + bubble.userData.phase) * 0.002;
          if (bubble.position.y > 3.35) bubble.position.y = -3.15;
        }

        caustics.rotation.y = Math.sin(t * 0.22) * 0.08;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      void smoothBlueWhaleSilhouette;
      void imageReferenceFluke;
    </script>
  </body>
</html>
